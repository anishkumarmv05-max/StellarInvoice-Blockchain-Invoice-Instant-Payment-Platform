name: Deploy Smart Contract to Testnet

on:
  push:
    branches:
      - main
    paths:
      - 'contracts/stellar_invoice_contract/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          
      - name: Add wasm32v1-none target
        run: rustup target add wasm32v1-none

      - name: Install system dependencies for Stellar CLI
        run: sudo apt-get update && sudo apt-get install -y pkg-config libdbus-1-dev libudev-dev

      - name: Install Stellar CLI
        run: |
          wget https://github.com/stellar/stellar-cli/releases/download/v27.0.0/stellar-cli-27.0.0-x86_64-unknown-linux-gnu.tar.gz
          tar -xzvf stellar-cli-27.0.0-x86_64-unknown-linux-gnu.tar.gz
          sudo mv stellar /usr/local/bin/

      - name: Build Smart Contract
        run: |
          cd contracts/stellar_invoice_contract
          stellar contract build
        
      - name: Configure Network and Identity
        run: |
          # Generate a new identity for deployment
          stellar keys generate github_deployer --network testnet
          
          # Fund the identity using Friendbot
          stellar keys fund github_deployer --network testnet

      - name: Deploy Contract
        id: deploy
        run: |
          # Deploy the compiled WASM and capture output
          CONTRACT_ID=$(stellar contract deploy \
            --wasm contracts/stellar_invoice_contract/target/wasm32v1-none/release/stellar_invoice_contract.optimized.wasm \
            --source github_deployer \
            --network testnet)
            
          echo "Deployed Contract ID: $CONTRACT_ID"
          echo "contract_id=$CONTRACT_ID" >> $GITHUB_ENV

      - name: Output Contract ID to Summary
        run: |
          echo "### 🚀 Smart Contract Successfully Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "**Network**: Stellar Testnet" >> $GITHUB_STEP_SUMMARY
          echo "**Contract ID**: \`${{ env.contract_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View on Stellar Expert](https://stellar.expert/explorer/testnet/contract/${{ env.contract_id }})" >> $GITHUB_STEP_SUMMARY
